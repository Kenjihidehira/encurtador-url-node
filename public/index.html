<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LinkPulse Campaign Links</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <div>
          <p class="eyebrow">Inteligência de links de marketing</p>
          <h1>Transforme propostas, QRs e cliques de anúncios em dados rastreáveis de pipeline.</h1>
        </div>
        <form id="quickLink" class="quick-form">
          <input name="slug" placeholder="oferta-cliente" required>
          <input name="destination" placeholder="https://exemplo.com/oferta" required>
          <button type="submit">Criar link</button>
        </form>
      </header>

      <section id="kpis" class="kpis"></section>

      <section class="grid">
        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Principais links</p>
              <h2>Desempenho de campanhas</h2>
            </div>
          </div>
          <div id="links" class="links"></div>
        </article>

        <article class="panel qr-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Ativo QR</p>
              <h2 id="qrTitle">QR da campanha</h2>
            </div>
          </div>
          <div id="qr" class="qr"></div>
          <div id="channels" class="channels"></div>
        </article>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Alertas de risco</p>
            <h2>Links que precisam de atenção</h2>
          </div>
        </div>
        <div id="risks" class="risks"></div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
